name: Asuna Engine
on:
  issues:
    types: [opened, labeled]

jobs:
  sync:
    if: contains(github.event.issue.labels.*.name, 'auto-add') || contains(github.event.issue.labels.*.name, 'auto-delete')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTION_TYPE: ${{ contains(github.event.issue.labels.*.name, 'auto-add') && 'add' || 'delete' }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: go run main.go
      - name: Deploy
        run: |
          git config --local user.email "bot@github.com"
          git config --local user.name "AsunaBot"
          git add .
          git commit -m "auto: sync via issue #${{ github.event.issue.number }}" || exit 0
          git push
      - name: Close
        uses: peter-evans/close-issue@v3
        with:
          issue-number: ${{ github.event.issue.number }}
          comment: "✅ 任务已处理，README 与分类表单已自动刷新！"