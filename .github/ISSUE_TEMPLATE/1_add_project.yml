name: ➕ 新增开源项目
description: 提交一个新的优秀开源项目到收录录
title: "[Add]: 自动解析新项目"
labels: ["auto-add"]
body:
  - type: input
    id: repo_url
    attributes:
      label: GitHub 仓库地址
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: 归属分类 (选择已有)
      options:
        # 后端开发
        - "☕ Java 生态 / 开发框架(Spring)"
        - "☕ Java 生态 / 基础工具类"
        - "☕ Java 生态 / ORM 持久层"
        - "☕ Java 生态 / 权限&安全"
        - "☕ Java 生态 / 缓存&限流"
        - "☕ Java 生态 / 多线程&并发"
        - "☕ Java 生态 / 日志&监控"
        - "☕ Java 生态 / 组件&插件"
        - "☕ Java 生态 / 实战&源码"
        - "🐹 Go 生态 / Go 开发框架"
        - "🐹 Go 生态 / 工具&实战"
  - type: input
    id: new_category
    attributes:
      label: 💡 或创建新分类 (支持多级，用 / 分隔)
      description: 例如 "后端 / Go / Web框架"