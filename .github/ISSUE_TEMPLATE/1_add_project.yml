name: ➕ 新增开源项目
description: 提交一个新的优秀开源项目到收录录
title: "[Add]: <填写项目名>"
labels: ["auto-add"]
body:
  - type: input
    id: repo_url
    attributes:
      label: GitHub 仓库地址
      description: 必须提供标准 GitHub 地址，例如 https://github.com/weihubeats/Asuna
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: 归属分类
      options:
        - "🚀 效能与开发工具"
        - "🗄️ 数据库与中间件"
        - "☁️ 云原生架构"
    validations:
      required: true