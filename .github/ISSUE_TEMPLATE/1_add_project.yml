name: ➕ 新增开源项目
description: 提交一个新的优秀开源项目到收录录
title: "[Add]: <填写项目名>"
labels: ["auto-add"]
body:
  - type: input
    id: repo_url
    attributes:
      label: GitHub 仓库地址
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: 归属分类 (选择已有)
      options:
        - "☕ Java 生态"
        - "☕ Java 生态 / 开发框架(Spring)"
  - type: input
    id: new_category
    attributes:
      label: 💡 或创建新分类 (支持多级，用 / 分隔)
      description: 例如 "后端 / Go / Web框架"
