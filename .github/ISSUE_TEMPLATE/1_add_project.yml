name: ➕ 新增开源项目
description: 提交一个新的优秀开源项目到收录录
title: "[Add]: <填写项目名>"
labels: ["auto-add"]
body:
  - type: input
    id: repo_url
    attributes:
      label: GitHub 仓库地址
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: 归属分类 (选择已有)
      options:
        # 通用基础
        - "📁 未整理 / 未分类"
        - "📚 学习成长 / 面试刷题"
        - "📚 学习成长 / 算法刷题"
        - "📚 学习成长 / 编程语言"

        # 后端开发
        - "☕ Java 生态 / 开发框架(Spring)"
        - "☕ Java 生态 / 基础工具类"
        - "☕ Java 生态 / ORM 持久层"
        - "☕ Java 生态 / 权限&安全"
        - "☕ Java 生态 / 缓存&限流"
        - "☕ Java 生态 / 多线程&并发"
        - "☕ Java 生态 / 日志&监控"
        - "☕ Java 生态 / 组件&插件"
        - "☕ Java 生态 / 实战&源码"
        - "🐹 Go 生态 / Go 开发框架"
        - "🐹 Go 生态 / 工具&实战"

        # 前端&客户端
        - "🖥️ 前端开发 / Vue/React"
        - "🖥️ 前端开发 / 工程化&工具"
        - "🧩 浏览器插件 / 拓展工具"

        # 中间件&数据
        - "📨 消息中间件 / 队列&调度"
        - "🗄️ 数据库 / 关系型MySQL"
        - "🗄️ 数据库 / 非关系型NoSQL"
        - "🟥 Redis 生态 / 客户端&拓展"
        - "🔍 搜索引擎 / 检索服务"
        - "🔁 数据同步 / 数据迁移"

        # 分布式&架构
        - "🌐 分布式 / 微服务"
        - "🌐 分布式 / RPC 框架"
        - "🌐 分布式 / 注册&配置"
        - "🌐 分布式 / 分布式事务"
        - "🌐 分布式 / 一致性算法"
        - "🚪 网关 / 服务网关"
        - "🔄 流程引擎 / 低代码流程"

        # 可观测&运维
        - "📊 可观测 / 链路追踪APM"
        - "📈 监控告警 / 运维监控"
        - "🐳 容器&云原生 / Docker/K8s"
        - "🛠️ 运维工具 / 内网穿透"
        - "🛠️ 运维工具 / 项目管理"

        # AI 领域
        - "🤖 AI 大模型 / 应用开发"
        - "🤖 AI 大模型 / Agent 智能体"
        - "🤖 AI 大模型 / Prompt 工程"
        - "🤖 AI 大模型 / 学习资料"

        # 测试&安全
        - "🧪 测试开发 / 自动化测试"
        - "🛡️ 安全防护 / 代码&应用安全"

        # 文档&内容
        - "📖 文档工具 / 博客系统"
        - "📖 文档工具 / Markdown 编辑器"
        - "📜 学术论文 / 技术论文"

        # 工具&副业生活
        - "🛠️ 效率工具 / 通用工具"
        - "🛠️ 效率工具 / Mac 工具"
        - "🕷️ 爬虫开发 / 数据采集"
        - "🎬 多媒体 / 视频下载&绘图"
        - "💰 程序员副业 / 副业项目"
        - "❤️ 健康生活 / 日常健康"
        - "💬 生态拓展 / 微信生态"
  - type: input
    id: new_category
    attributes:
      label: 💡 或创建新分类 (支持多级，用 / 分隔)
      description: 例如 "后端 / Go / Web框架"